apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

android {
    namespace "com.alsonacademy"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.alsonacademy"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            shrinkResources false
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

def hermesEnabled = project.getProperties().get("hermesEnabled")?.toBoolean() ?: false

dependencies {
   implementation("com.facebook.react:react-native:0.74.5")


    if (hermesEnabled) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation("io.github.react-native-community:jsc-android:2026004.+")
    }
}
