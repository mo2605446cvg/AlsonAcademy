buildscript {
      ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "1.8.10"
    }
    
    repositories {
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") } // ✅ مهم جدًا
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.0.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") } // ✅ مهم هنا كمان
    }
}
apply plugin: "com.facebook.react.rootproject"
