name: Build APK from React Native

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JS dependencies
        run: |
          npm install
          npm install react-native-worklets

      - name: Verify React Native version
        run: |
          RN_VERSION=$(node -p "require('./package.json').dependencies['react-native']")
          echo "Using React Native version $RN_VERSION"
          if [[ "$RN_VERSION" < "0.75.0" ]]; then
            echo "❌ React Native version must be >= 0.75.0"
            exit 1
          fi

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk








