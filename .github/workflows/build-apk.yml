name: Build APK from JS-only project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Changed to ubuntu-22.04 for better compatibility

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Ruby and CocoaPods
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev
          sudo gem install cocoapods -v 1.15.2

      - name: Install project dependencies
        run: npm install

      - name: Install react-native-worklets
        run: npm install react-native-worklets

      - name: Create temporary RN project (v0.75.3)
        run: |
          npx @react-native-community/cli@13.6.9 init TempProject --version 0.75.3 --skip-install --verbose || {
            echo "Template initialization failed. Dumping logs for debugging:"
            cat TempProject/*.log || true
            exit 1
          }
          cd TempProject
          npm install
          if [ -d "android" ]; then
            echo "Android directory found."
            cd ..
            mv TempProject/android .
          else
            echo "Error: Android directory not found in TempProject."
            ls -la TempProject
            exit 1
          fi
          rm -rf TempProject

      - name: Configure Gradle (disable Hermes if needed)
        run: |
          sed -i 's/enableHermes: true/enableHermes: false/' android/app/build.gradle || true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk




