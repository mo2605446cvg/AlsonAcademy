name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install React Native CLI
        run: npm install -g react-native-cli

      - name: Recreate android folder
        run: npx react-native init tempApp && cp -r tempApp/android ./ && rm -rf tempApp

      - name: Enable JSC instead of Hermes
        run: |
          sed -i 's/hermesEnabled: true/hermesEnabled: false/' android/app/build.gradle

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
