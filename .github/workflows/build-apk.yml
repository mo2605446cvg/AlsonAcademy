name: Build APK from JS-only project

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install community CLI (for RN init)
        run: npm install -g @react-native-community/cli

      - name: Create temporary RN project (with android)
        run: |
          npx @react-native-community/cli init TempProject --version 0.74.0
          rm -rf android
          mv TempProject/android .
          rm -rf TempProject

      - name: Install dependencies
        run: |
          npm install
          npm install react-native-worklets

      - name: Disable Hermes (optional)
        run: |
          sed -i 's/hermesEnabled: true/hermesEnabled: false/' android/app/build.gradle || true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk



